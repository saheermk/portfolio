<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Saheer | Creative Developer</title>
    <meta name="title" content="Saheer | Creative Developer" />
    <meta
      name="description"
      content="Portfolio of Saheer, a Creative Developer specializing in interactive, high-performance web applications and scalable architectures."
    />
    <!-- Keywords for SEO -->
    <meta
      name="keywords"
      content="Saheer, Creative Developer, Web Developer, Frontend Engineer, React, GSAP, Portfolio, Interaction Design"
    />
    <meta name="author" content="Saheer" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/saheermk/" />
    <meta property="og:title" content="Saheer | Creative Developer" />
    <meta
      property="og:description"
      content="Portfolio of Saheer, a Creative Developer specializing in interactive, high-performance web applications and scalable architectures."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://github.com/saheermk/" />
    <meta property="twitter:title" content="Saheer | Creative Developer" />
    <meta
      property="twitter:description"
      content="Portfolio of Saheer, a Creative Developer specializing in interactive, high-performance web applications and scalable architectures."
    />

    <!-- JSON-LD for Answer Engine Optimization (AEO) and SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Saheer",
        "url": "https://github.com/saheermk/",
        "jobTitle": "Creative Developer",
        "sameAs": [
          "https://in.linkedin.com/in/saheermk",
          "https://github.com/saheermk/"
        ],
        "email": "mailto:mail.saheermk@gmail.com",
        "description": "Creative Developer blending design and engineering to create immersive web applications."
      }
    </script>
    <!-- Preconnect to Google Fonts to speed up DNS and TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load Inter font asynchronously -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body style="margin: 0; background-color: #000; color: #fff;">
    <div id="root">
      <!-- Initial skeleton to prevent blank screen -->
      <div
        id="initial-loader"
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          background-color: #000;
          z-index: 9999;
          transition: opacity 0.5s ease;
        "
      >
        <h1 style="font-size: clamp(3rem, 8vw, 6rem); font-weight: 800; margin: 0; opacity: 0.1;">
          SAHEER
        </h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
